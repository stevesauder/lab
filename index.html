<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>My YouTube Video List</h1>
    <div class="controls">
        <input type="text" id="topicInput" placeholder="What do you want to see?">
        <button id="generateBtn">Generate List</button>
        <button id="aiBtn">AI Suggest</button>
        <button id="refreshBtn" class="refresh">Refresh</button>
    </div>
    <p class="note">Use Refresh to generate a new set of recommendations for the current topic.</p>
    <p id="statusMessage" class="status-message" aria-live="polite"></p>
    <ul id="videoList"></ul>
    <script src="script.js"></script>
</body>
</html>
